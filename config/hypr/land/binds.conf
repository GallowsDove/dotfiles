binde = $MOD1 CTRL, left,  layoutmsg, swapcol l
binde = $MOD1 CTRL, down,  movewindow, d
binde = $MOD1 CTRL, up,    movewindow, u
binde = $MOD1 CTRL, right, layoutmsg, swapcol r

binde = $MOD1 CTRL, H,     layoutmsg, swapcol l
binde = $MOD1 CTRL, J,     movewindow, d
binde = $MOD1 CTRL, K,     movewindow, u
binde = $MOD1 CTRL, L,     layoutmsg, swapcol r

bind = $MOD1 SHIFT, left,  focusmonitor, l
bind = $MOD1 SHIFT, down,  focusmonitor, d
bind = $MOD1 SHIFT, up,    focusmonitor, u
bind = $MOD1 SHIFT, right, focusmonitor, r
bind = $MOD1 SHIFT, H,     focusmonitor, l
bind = $MOD1 SHIFT, J,     focusmonitor, d
bind = $MOD1 SHIFT, K,     focusmonitor, u
bind = $MOD1 SHIFT, L,     focusmonitor, r

bind = $MOD1 CTRL SHIFT, left,  movewindow, mon:l
bind = $MOD1 CTRL SHIFT, down,  movewindow, mon:d
bind = $MOD1 CTRL SHIFT, up,    movewindow, mon:u
bind = $MOD1 CTRL SHIFT, right, movewindow, mon:r
bind = $MOD1 CTRL SHIFT, H,     movewindow, mon:l
bind = $MOD1 CTRL SHIFT, J,     movewindow, mon:d
bind = $MOD1 CTRL SHIFT, K,     movewindow, mon:u
bind = $MOD1 CTRL SHIFT, L,     movewindow, mon:r

bind = $MOD1, R, layoutmsg, colresize +conf

bind=$MOD1,mouse_down,workspace,+1
bind=$MOD1,mouse_up,workspace,-1

# hyprland
bind=$MOD1,Q,killactive,
bind=$MOD1,M,exit,
bind=$MOD1,E,exec,nautilus
bind=$MOD1,S,togglefloating,
bind=$MOD1,P,pseudo,
binde=$MOD1,left,layoutmsg,focus l
binde=$MOD1,right,layoutmsg,focus r
binde=$MOD1,up,movefocus,u
binde=$MOD1,down,movefocus,d
binde=$MOD1,H,layoutmsg,focus l
binde=$MOD1,J,movefocus,d
binde=$MOD1,K,movefocus,u
binde=$MOD1,L,layoutmsg,focus r
bind=$MOD1,g,togglegroup
bind=$MOD1,tab,changegroupactive
bind=$MOD1,f,exec,python3 $SCRIPTS/toggle_colresize.py
bind=$MOD1 SHIFT,f,fullscreen
bind=$MOD1,c,centerwindow

bindm=$MOD1,mouse:272,movewindow
bindm=$MOD1,mouse:273,resizewindow

binde=,xf86audiolowervolume,exec,$VOLRED
binde=,xf86audioraisevolume,exec,$VOLINC

binde=,xf86monbrightnessup,exec,$BRIGHTINC
binde=,xf86monbrightnessdown,exec,$BRIGHTRED

bind=,xf86kbdbrightnessup,exec,$KBDBRIGHTINC
bind=,xf86kbdbrightnessdown,exec,$KBDBRIGHTRED

# util
bind=$MOD1,D,exec,$DRUN
# bind=$MOD1,t,exec,$TERM --start-as=fullscreen -o 'font_size=25' --title all_is_kitty
# bind=$MOD1,RETURN,exec,$TERMFLOAT
bind=$MOD1,T,exec,$TERM
bind=CTRL ALT,T,exec,$TERM
bind=$MOD1 SHIFT,s,exec,$SCREENSHOT

bind=$MOD1 SHIFT,L,exec,$LOCK
