# windowrule=float,title:^(Spotify)$

windowrule {
    name = suppress maximize
	match:class = .*
	suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = xwayland dragging fix
    match:class = ^$
    match:title = ^$
    match:xwayland = true
	match:float = true
	match:fullscreen = false
	match:pin = false
	no_initial_focus = true
}
