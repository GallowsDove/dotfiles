$font = FOT-Rodin Pro M

general {
	hide_cursor = true
	ignore_empty_input = true
	text_trim = true
}

animations {
	enabled = true
	bezier = yorha, 0.16, 1, 0.3, 1
	animation = fadeIn, 1, 5, yorha
	animation = fadeOut, 1, 4, yorha
	animation = inputFieldWidth, 1, 3, yorha
	animation = inputFieldDots, 1, 2, yorha
}

background {
	monitor =
	path = screenshot
	color = rgb(c2bda6)
	blur_passes = 3
	blur_size = 7
	noise = 0.03
	contrast = 0.95
	brightness = 0.82
	vibrancy = 0.08
	vibrancy_darkness = 0.0
}

shape {
	monitor =
	size = 276, 276
	color = rgba(00000000)
	rounding = -1
	border_size = 0
	border_color = rgba(48463d33)
	position = 0, 0
	halign = center
	valign = center
}

image {
	monitor =
	path = /home/arch/.config/hypr/themes/yorha/components/ags/assets/light/yorha.png
	size = 128
	rounding = 0
	border_size = 0
	position = 0, 0
	halign = center
	valign = center
}

input-field {
	monitor =
	size = 244, 244
	outline_thickness = 6
	dots_size = 0.18
	dots_spacing = 0.22
	dots_center = true
	dots_rounding = -1
	inner_color = rgba(00000000)
	outer_color = rgb(48463d)
	font_color = rgb(48463d)
	hide_input_base_color = rgb(b57614)
	check_color = rgb(427b58)
	fail_color = rgb(9d0006)
	capslock_color = rgb(8f3f71)
	fade_on_empty = false
	hide_input = true
	rounding = -1
	placeholder_text = <span></span>
	fail_text = <span></span>
	font_family = $font
	position = 0, 0
	halign = center
	valign = center
	shadow_passes = 1
	shadow_size = 4
	shadow_color = rgba(48463d16)
}
