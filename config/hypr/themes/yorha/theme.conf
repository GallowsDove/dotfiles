env = COLORFILE,$yorha/colors_nier_light
env = STARSHIP_CONFIG,$yorha/components/starship.toml
env = HYPRLAND_THEME,$yorha
env = XCURSOR_THEME,nier-cursors-bin
env = HYPRCURSOR_THEME,nier-cursors-bin
exec-once=matugen json $yorha/colors.json
exec-once=fcitx5 -d
exec=pkill agsv1
exec=sleep 1 && agsv1 -c $yorha/components/ags/config.js
exec=swww-daemon
exec=sleep 1 && swww img $yorha/wallpapers/nier_light.png --transition-type simple --transition-step 255
exec-once=hyprpm reload -n

# bind=Super,D,exec,$DRUN

####################################################################
# setting these here will override the values in main hyprland.conf
$DRUN=agsv1 -b settings -t settings
$SCREENSHOT=$yorha/scripts/screenshot $yorha

# $TERM=footclient -o shell="fish -C 'source $yorha/components/fish/theme.fish'"
$TERM=kitty
# $TERMSERVER=foot -s -c $yorha/components/foot.ini # -o shell="fish -C 'source $yorha/components/fish/theme.fish'"
# $TERMFLOAT=$TERM --title fly_is_foot -w 1067x630
####################################################################

source = $yorha/theme_nier_light.conf

layerrule {
    name = bg_settings-ignore-alpha
    match:namespace = bg_settings
    ignore_alpha = 0.3
}
layerrule {
    name = bg_bitwarden-ignore-alpha
    match:namespace = bg_bitwarden
    ignore_alpha = 0.3
}
layerrule {
  name = side-ignore-alpha
  match:namespace = side
  ignore_alpha = true
}
layerrule {
  name = bar-ignore-alpha
  match:namespace = bar
  ignore_alpha = true
}
layerrule {
  name = geom-ignore-alpha
  match:namespace = geom
  ignore_alpha = true
}
layerrule {
  name = bg_settings-blur
  match:namespace = bg_settings
  blur = true
}
layerrule {
  name = bg_bitwarden-blur
  match:namespace = bg_bitwarden
  blur = true
}
layerrule {
  name = side-blur
  match:namespace = side
  blur = true
}
layerrule {
  name = bar-blur
  match:namespace = bar
  blur = true
}
layerrule {
  name = playerbg-ignore-alpha
  match:namespace = playerbg
  ignore_alpha = 0.01
}
layerrule {
  name = playerbg-blur
  match:namespace = playerbg
  blur = true
}

decoration {
    rounding=0
    blur {
        enabled=1
        size=5
        passes=2
        noise=0.05
    }
    shadow {
    range = 1
    render_power = 1
    offset =5 5
    }
    screen_shader = $yorha/components/gridlines.frag
}

plugin {
    hyprbars {
        bar_height = 40
        bar_text_size = 17
        bar_text_font = FOT-Rodin Pro M
        bar_text_align = left
    }
    
    hyprtheme {
        theme = $yorha/components/hyprtheme/theme.toml
    }
}

general {
    col.active_border = 0x00000000
    col.inactive_border = 0x00000000
    border_size = 0
    gaps_in = 20
    gaps_out = 20
}

animations {
    enabled = true
    bezier = in-out,0.65,-0.01,0.58,0.95
    bezier = woa,0,0,0,1
    animation=windows,1,2,woa,popin
    animation=border,1,10,default
    animation=fade,1,10,default
    animation=workspaces,1,5,in-out,slidevert
}

bind=Super,v,exec,agsv1 -b player -t player
bind=Super,x,exec,agsv1 -b player -t lyrics
bind=Super SHIFT,D,exec,agsv1 -b bitwarden -t bitwarden
